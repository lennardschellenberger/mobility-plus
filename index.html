<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Mobility-Plus</title>

<style>
body {
    font-family: 'Segoe UI', Arial, sans-serif;
    background-color: #f4f7f6;
    color: #1a1a1a;
    text-align: center;
    padding: 20px;
    font-size: 20px;
}

h1 {
    color: #005585;
    font-size: 36px;
    margin-bottom: 5px;
}

.subtitle {
    font-size: 18px;
    color: #555;
    margin-bottom: 30px;
}

.card {
    background: #ffffff;
    max-width: 650px;
    margin: auto;
    padding: 30px;
    border-radius: 20px;
    box-shadow: 0 8px 24px rgba(0,0,0,0.1);
}

input {
    font-size: 22px;
    padding: 12px;
    border: 2px solid #ccc;
    border-radius: 10px;
    margin: 8px 0;
    width: 90%;
    text-align: center;
    transition: 0.2s;
}

input:focus {
    border-color: #005585;
    outline: none;
}

.time-container {
    display: flex;
    justify-content: center;
    gap: 15px;
    margin: 15px 0 25px 0;
}

.time-box {
    flex: 1;
    padding: 15px;
    background: #eef5f9;
    border: 2px solid #b0b0b0;
    border-radius: 12px;
    font-size: 22px;
    font-weight: bold;
    color: #333;
    cursor: pointer;
    transition: 0.2s;
}

.time-box:hover {
    background: #dbede5;
    transform: translateY(-2px);
}

.time-box.selected {
    background: #005585;
    color: white;
    border-color: #005585;
}

button {
    font-size: 22px;
    font-weight: bold;
    padding: 18px 28px;
    margin: 10px;
    border: none;
    border-radius: 12px;
    cursor: pointer;
    transition: 0.2s;
}

button:hover { transform: scale(1.03); }

.start { background-color: #2e7d32; color: white; width: 80%; margin-top: 10px; }
.action-btn { background-color: #0066cc; color: white; min-width: 150px; }
.stop { background-color: #2e7d32; color: white; min-width: 150px; }

.diff { background-color: #e0e0e0; color: #333; border: 2px solid #b0b0b0; }
.active { outline: 5px solid #005585; background-color: #005585; color: white; }

#game { display: none; }

.taskCard {
    margin: 30px auto;
    background: linear-gradient(145deg, #ffffff, #e6f2ff);
    border: 3px solid #0066cc;
    border-radius: 20px;
    padding: 30px;
    max-width: 500px;
    box-shadow: 0 4px 15px rgba(0,99,204,0.15);
    animation: flip 0.4s ease;
}

@keyframes flip {
    0% { transform: rotateX(70deg); opacity: 0; }
    100% { transform: rotateX(0deg); opacity: 1; }
}

#task { font-size: 26px; font-weight: bold; margin: 20px 0; color: #222; line-height: 1.4; }
#player { font-size: 34px; color: #005585; font-weight: bold; }
#timer { font-size: 60px; font-weight: bold; color: #c62828; margin: 10px; }

#board {
    margin-top: 25px;
    text-align: left;
    font-size: 18px;
    background: #eef5f9;
    padding: 20px;
    border-radius: 12px;
    border-left: 6px solid #005585;
}

#dynamicInputs {
    max-height: 250px;
    overflow-y: auto;
    padding: 5px;
    margin-bottom: 15px;
}
</style>
</head>

<body>

<h1>Mobility-Plus</h1>
<div class="subtitle">Interaktive Bewegungsförderung im Alltag</div>

<div class="card">

    <div id="setup">
        <h3>Namen der Teilnehmenden:</h3>
        
        <div id="dynamicInputs">
            <input type="text" class="player-input" placeholder="Name Person 1" oninput="handleInput(this)">
        </div>

        <h3>Gesamt-Zeitkonto pro Person (Sekunden):</h3>
        <div class="time-container">
            <div class="time-box" onclick="selectTime(60, this)">60s</div>
            <div class="time-box selected" onclick="selectTime(120, this)">120s</div>
            <div class="time-box" onclick="selectTime(180, this)">180s</div>
            <div class="time-box" onclick="selectTime(240, this)">240s</div>
        </div>

        <button class="start" onclick="startGame()">SPIEL STARTEN</button>
    </div>

    <div id="game">
        <div id="player">---</div>

        <div class="taskCard" id="card">
            <div id="task">Bitte Übungsart wählen</div>
            <div id="timer">0</div>
        </div>

        <div style="margin-bottom: 20px;">
            <button class="diff" onclick="setDiff('easy', this)">Im Sitzen (1 Punkt)</button>
            <button class="diff" onclick="setDiff('medium', this)">Stand Leicht (2 Punkte)</button>
            <button class="diff" onclick="setDiff('hard', this)">Stand Aktiv (3 Punkte)</button>
        </div>

        <div>
            <button class="action-btn" onclick="startTurn()">Start</button>
            <button class="stop" onclick="stopTurn()">Erledigt</button>
        </div>

        <div id="board"></div>
    </div>

</div>

<audio id="lobbyMusic" src="lobby.mp3" loop></audio>
<audio id="gameMusic" src="spiel.mp3" loop></audio>

<script>
let players = [], scores = [], timeLeft = [];
let current = 0;
let timer = null;
let running = false;
let difficulty = null;
let baseTimeSelected = 120;
let nextTaskText = "";

const tasks = {
   easy: [
      "Im Sitzen: Beide Arme weit nach oben strecken, als ob du reife Äpfel vom Baum pflückst.",
      "Im Sitzen: Die Fußspitzen kraftvoll anheben, kurz halten und wieder absenken (aktiviert die Schienbeinmuskeln).",
      "Im Sitzen: Große, langsame Kreise mit den Schultern nach hinten beschreiben, um den Nacken zu lockern.",
      "Im Sitzen: Den Kopf ganz langsam erst zur linken Schulter drehen, kurz halten, dann zur rechten Schulter.",
      "Im Sitzen: Die Hände auf die Knie legen und mit dem Oberkörper große, sanfte Kreise im Uhrzeigersinn machen.",
      "Im Sitzen: Ein Bein komplett gerade nach vorne ausstrecken, Zehen heranziehen, 3 Sekunden halten, dann wechseln.",
      "Im Sitzen: Die Hände fest zur Faust ballen, dann die Finger so weit wie möglich spreizen (Fördert die Durchblutung).",
      "Im Sitzen: Die Hände hinter dem Kopf verschränken und die Ellbogen weit nach hinten drücken, um die Brust zu öffnen.",
      "Im Sitzen: Abwechselnd die Knie so weit wie möglich Richtung Decke anheben (Marschieren im Sitzen).",
      "Im Sitzen: Mit beiden Füßen gleichzeitig auf dem Boden 'tippeln', als ob es trommelt (Schnelligkeit & Koordination).",
      "Im Sitzen: Den linken Arm diagonal nach rechts oben strecken, dann den rechten Arm nach links oben.",
      "Im Sitzen: Die Fußgelenke in der Luft große Kreise drehen lassen – erst links, dann rechts.",
      "Im Sitzen: Die Unterarme vor dem Gesicht zusammenführen (Ellbogen berühren sich) und weit nach hinten öffnen.",
      "Im Sitzen: Den Oberkörper langsam nach vorne beugen, versuchen mit den Händen die Fußspitzen zu berühren.",
      "Im Sitzen: 'Katzenbuckel und Kuh' – Den Rücken ganz rund machen, dann die Brust stolz nach vorne herausstrecken."
   ],
   medium: [
      "Am Stuhl festhalten: Kontrolliert auf die Zehenspitzen stellen, kurz halten und langsam wieder absenken.",
      "Mit Stuhl-Unterstützung: Abwechselnd ein Bein gestreckt zur Seite abspreizen (kräftigt die Hüftstabilität).",
      "Sicherer Stand: Auf der Stelle langsam und rhythmisch marschieren, die Arme locker mitschwingen lassen.",
      "Am Stuhl festhalten: Ein Bein nach hinten strecken, ohne den Oberkörper zu weit nach vorne zu beugen.",
      "Sicherer Stand: Die Hände an die Hüften legen und das Becken ganz langsam in großen Kreisen bewegen.",
      "Mit Stuhl-Unterstützung: Das rechte Knie Hüfthoch anheben, kurz halten, absetzen, dann das linke Knie.",
      "Sicherer Stand: Die Arme auf Schulterhöhe nach vorne ausstrecken und für die Dauer der Übung stabil halten.",
      "Am Stuhl festhalten: Die Füße hintereinanderstellen (Tandem-Stand) und versuchen, das Gleichgewicht zu halten.",
      "Sicherer Stand: Die Arme hängen lassen und den Oberkörper abwechselnd nach links und rechts unten neigen.",
      "Am Stuhl festhalten: Ein Bein leicht anheben und mit dem Fuß eine '8' in die Luft schreiben.",
      "Am Stuhl festhalten: Leicht in die Knie gehen (Minikniebeuge) und den Po nach hinten schieben, als ob ein Stuhl da wäre.",
      "Sicherer Stand: Die Hände auf den Schultern ablegen und mit den EMit den Ellbogen große Kreise in die Luft malen.",
      "Am Stuhl festhalten: Das Gewicht komplett auf den linken Fuß verlagern, den rechten Fuß leicht anheben. Dann wechseln.",
      "Sicherer Stand: Die Schulterblätter hinten fest zusammenziehen, 5 Sekunden halten, wieder locker lassen.",
      "Mit Stuhl-Unterstützung: Den linken Arm nach vorne strecken und zeitgleich das rechte Bein nach hinten ausstrecken."
   ],
   hard: [
      "Freier Stand: Einmal vollkommen ohne Hilfe der Hände vom Stuhl aufstehen und kontrolliert wieder hinsetzen.",
      "Freier Stand: 5 langsame und saubere Kniebeugen machen (Po schiebt weit nach hinten, Rücken bleibt gerade).",
      "Balance-Test: Versuchen, für volle 10 Sekunden absolut sicher auf dem linken Bein zu stehen (Stuhl in Reichweite!).",
      "Koordination: Mit der rechten Hand das angehobene linke Knie berühren, dann mit der linken Hand das rechte Knie.",
      "Freier Stand: Die Arme seitlich ausstrecken und kleine, schnelle Kreise vorwärts und rückwärts in die Luft malen.",
      "Ausfallschritt: Einen großen Schritt nach vorne machen, stabil ausbalancieren, zurücksteigen und das Bein wechseln.",
      "Freier Stand: Gewichtsverlagerung von links nach rechts – dabei das freie Bein jeweils kurz in der Luft halten.",
      "Freier Stand: Beide Arme zeitgleich wie Windmühlenflügel versetzt vor und zurück kreisen lassen.",
      "Seiltänzer: 3 Schritte direkt voreinander (Ferse an Fußspitze) nach vorne gehen, dann 3 Schritte rückwärts.",
      "Freier Stand: Den Oberkörper sanft nach links und rechts rotieren lassen, die Arme schwingen dabei locker mit.",
      "Koordinativ: Rechte Hand berührt die linke Ferse hinter dem Körper, linke Hand berührt die rechte Ferse.",
      "Freier Stand: Auf den Zehenspitzen stehen und versuchen, die Arme abwechselnd nach oben zu strecken.",
      "Freier Stand: Die Knie beim Marschieren auf der Stelle extra hoch ziehen (Richtung Brust) und oben kurz halten.",
      "Boxer-Lauf: Auf der Stelle locker gehen und gleichzeitig schnelle, leichte Boxschläge in die Luft abgeben.",
      "Freier Stand: Versuchen, mit geschlossenen Augen für 10 Sekunden völlig stabil und aufrecht stehen zu bleiben."
   ]
};

// Startet die Lobbymusik, sobald der Nutzer das erste Mal ins Namensfeld klickt oder tippt
function handleInput(currentInput) {
    const lobbyMusic = document.getElementById("lobbyMusic");
    if (lobbyMusic.paused) {
        lobbyMusic.volume = 0.4;
        lobbyMusic.play().catch(e => console.log("Audio-Wiedergabe wartet auf Interaktion."));
    }

    const container = document.getElementById("dynamicInputs");
    const inputs = container.getElementsByClassName("player-input");
    
    if (currentInput === inputs[inputs.length - 1] && currentInput.value.trim() !== "") {
        const nextIndex = inputs.length + 1;
        const newInput = document.createElement("input");
        newInput.type = "text";
        newInput.className = "player-input";
        newInput.placeholder = "Name Person " + nextIndex;
        newInput.oninput = function() { handleInput(this); };
        container.appendChild(newInput);
        
        container.scrollTop = container.scrollHeight;
    }
}

function playTone(freq, duration, delay = 0) {
    setTimeout(() => {
        try {
            let ctx = new (window.AudioContext || window.webkitAudioContext)();
            let o = ctx.createOscillator();
            let g = ctx.createGain();
            o.frequency.value = freq;
            o.type = "sine";
            g.gain.value = 0.08;
            o.connect(g);
            g.connect(ctx.destination);
            o.start();
            setTimeout(() => o.stop(), duration);
        } catch(e) { console.log("Audio-Fehler abgefangen"); }
    }, delay);
}

function soundStart() {
    playTone(523.25, 150, 0);
    playTone(659.25, 150, 150);
}

function soundPoint() {
    playTone(523.25, 100, 0);
    playTone(783.99, 150, 100); 
}

function soundGameOver() {
    playTone(400, 200, 0);
    playTone(300, 300, 200);
    playTone(200, 400, 500);
}

function selectTime(seconds, element) {
    baseTimeSelected = seconds;
    document.querySelectorAll(".time-box").forEach(box => box.classList.remove("selected"));
    element.classList.add("selected");
}

function setDiff(d, element) {
    if(running) return;
    difficulty = d;
    document.querySelectorAll(".diff").forEach(b => b.classList.remove("active"));
    element.classList.add("active");
    
    let list = tasks[difficulty];
    nextTaskText = list[Math.floor(Math.random() * list.length)];
    
    document.getElementById("task").innerText = "Übung bereit - Bitte starten";
}

function getWordForPoints(value) {
    return value === 1 ? "Punkt" : "Punkte";
}

function updateBoard() {
    let html = "<b>Aktivitäts-Protokoll und Zeitkonten</b><br><table style='width:100%; margin-top:10px; border-spacing: 10px;'>";
    for(let i = 0; i < players.length; i++) {
        let activeMarker = (i === current && timeLeft[i] > 0) ? "-> " : "";
        let statusText = timeLeft[i] <= 0 ? "<span style='color:#c62828; font-weight:bold;'>Zeit leer</span>" : `${timeLeft[i]}s`;
        
        html += `<tr style='${(i === current && timeLeft[i] > 0) ? "font-weight:bold; color:#005585;" : ""}'>
                    <td>${activeMarker}${players[i]}</td>
                    <td>${scores[i]} ${getWordForPoints(scores[i])}</td>
                    <td>${statusText}</td>
                 </tr>`;
    }
    html += "</table>";
    document.getElementById("board").innerHTML = html;
}

function startGame() {
    const inputElements = document.querySelectorAll(".player-input");
    players = Array.from(inputElements)
                   .map(el => el.value.trim())
                   .filter(name => name !== "");

    if(players.length < 1) {
        alert("Bitte mindestens einen Namen eingeben.");
        return;
    }

    // MUSIK-WECHSEL HIER:
    document.getElementById("lobbyMusic").pause(); // Stoppt Lobbymusik
    const gameMusic = document.getElementById("gameMusic");
    gameMusic.volume = 0.4; // Lautstärke Spielemusik (40%)
    gameMusic.play().catch(e => console.log("Spiele-Musik konnte nicht geladen werden."));

    scores = Array(players.length).fill(0);
    timeLeft = Array(players.length).fill(baseTimeSelected);

    document.getElementById("setup").style.display = "none";
    document.getElementById("game").style.display = "block";

    current = 0;
    loadPlayer();
}

function loadPlayer() {
    if (timeLeft.every(t => t <= 0)) {
        endGame();
        return;
    }

    let initialCurrent = current;
    while (timeLeft[current] <= 0) {
        current = (current + 1) % players.length;
        if (current === initialCurrent) {
            endGame();
            return;
        }
    }

    document.getElementById("player").innerText = "An der Reihe: " + players[current];
    document.getElementById("task").innerText = "Wähle eine Übungsart aus (Buttons unten)";
    document.getElementById("timer").innerText = timeLeft[current];
    running = false;
    clearInterval(timer);
    updateBoard();
}

function startTurn() {
    if (!difficulty) {
        alert("Bitte wählen Sie zuerst eine Übungsart aus!");
        return;
    }
    if (running) return;

    document.getElementById("task").innerText = nextTaskText;

    soundStart();
    running = true;

    timer = setInterval(() => {
        if (timeLeft[current] > 0) {
            timeLeft[current]--;
            document.getElementById("timer").innerText = timeLeft[current];
        }

        if (timeLeft[current] <= 0) {
            clearInterval(timer);
            running = false;
            updateBoard();
            alert(players[current] + "s Zeitkonto ist abgelaufen!");
            nextPlayer();
        }
        updateBoard();
    }, 1000);
}

function stopTurn() {
    if (!running) return;

    clearInterval(timer);
    running = false;

    let points = difficulty === "easy" ? 1 : difficulty === "medium" ? 2 : 3;
    scores[current] += points;

    soundPoint();
    nextPlayer();
}

function nextPlayer() {
    document.querySelectorAll(".diff").forEach(b => b.classList.remove("active"));
    difficulty = null;
    nextTaskText = "";
    current = (current + 1) % players.length;
    loadPlayer();
}

function endGame() {
    clearInterval(timer);
    document.getElementById("gameMusic").pause(); // Stoppt Spielemusik am Ende
    soundGameOver();

    let msg = "ALLE ZEITKONTEN LEER - AUSWERTUNG\n\nErgebnisübersicht:\n";
    let winner = "";
    let maxPoints = -1;

    for (let i = 0; i < players.length; i++) {
        msg += `${players[i]}: ${scores[i]} ${getWordForPoints(scores[i])}\n`;
        if (scores[i] > maxPoints) {
            maxPoints = scores[i];
            winner = players[i];
        }
    }

    msg += "\nSieger der Aktiv-Challenge ist: " + winner + "!";
    alert(msg);
    location.reload();
}
</script>

</body>
</html>
