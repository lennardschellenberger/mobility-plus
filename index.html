<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Mobility-Plus</title>

<style>
body {
    font-family: 'Segoe UI', Arial, sans-serif;
    background-color: #f4f7f6;
    color: #1a1a1a;
    text-align: center;
    padding: 20px;
    font-size: 20px;
}

h1 {
    color: #005585;
    font-size: 36px;
    margin-bottom: 5px;
}

.subtitle {
    font-size: 18px;
    color: #555;
    margin-bottom: 30px;
}

.card {
    background: #ffffff;
    max-width: 650px;
    margin: auto;
    padding: 30px;
    border-radius: 20px;
    box-shadow: 0 8px 24px rgba(0,0,0,0.1);
}

input {
    font-size: 22px;
    padding: 12px;
    border: 2px solid #ccc;
    border-radius: 10px;
    margin: 8px 0;
    width: 90%;
    text-align: center;
    transition: 0.2s;
}

input:focus {
    border-color: #005585;
    outline: none;
}

.time-container {
    display: flex;
    justify-content: center;
    gap: 15px;
    margin: 15px 0 25px 0;
}

.time-box {
    flex: 1;
    padding: 15px;
    background: #eef5f9;
    border: 2px solid #b0b0b0;
    border-radius: 12px;
    font-size: 22px;
    font-weight: bold;
    color: #333;
    cursor: pointer;
    transition: 0.2s;
}

.time-box:hover {
    background: #dbede5;
    transform: translateY(-2px);
}

.time-box.selected {
    background: #005585;
    color: white;
    border-color: #005585;
}

button {
    font-size: 22px;
    font-weight: bold;
    padding: 18px 28px;
    margin: 10px;
    border: none;
    border-radius: 12px;
    cursor: pointer;
    transition: 0.2s;
}

button:hover { transform: scale(1.03); }

.start { background-color: #2e7d32; color: white; width: 80%; margin-top: 10px; }
.action-btn { background-color: #0066cc; color: white; min-width: 150px; }
.stop { background-color: #2e7d32; color: white; min-width: 150px; }

.diff { background-color: #e0e0e0; color: #333; border: 2px solid #b0b0b0; }
.active { outline: 5px solid #005585; background-color: #005585; color: white; }

#game { display: none; }

.taskCard {
    margin: 30px auto;
    background: linear-gradient(145deg, #ffffff, #e6f2ff);
    border: 3px solid #0066cc;
    border-radius: 20px;
    padding: 30px;
    max-width: 500px;
    box-shadow: 0 4px 15px rgba(0,99,204,0.15);
    animation: flip 0.4s ease;
}

@keyframes flip {
    0% { transform: rotateX(70deg); opacity: 0; }
    100% { transform: rotateX(0deg); opacity: 1; }
}

#task { font-size: 28px; font-weight: bold; margin: 20px 0; color: #222; }
#player { font-size: 34px; color: #005585; font-weight: bold; }
#timer { font-size: 60px; font-weight: bold; color: #c62828; margin: 10px; }

#board {
    margin-top: 25px;
    text-align: left;
    font-size: 18px;
    background: #eef5f9;
    padding: 20px;
    border-radius: 12px;
    border-left: 6px solid #005585;
}

#dynamicInputs {
    max-height: 250px;
    overflow-y: auto;
    padding: 5px;
    margin-bottom: 15px;
}
</style>
</head>

<body>

<h1>Mobility-Plus</h1>
<div class="subtitle">Interaktive Bewegungsförderung im Alltag</div>

<div class="card">

    <div id="setup">
        <h3>Namen der Teilnehmenden:</h3>
        
        <div id="dynamicInputs">
            <input type="text" class="player-input" placeholder="Name Person 1" oninput="handleInput(this)">
        </div>

        <h3>Gesamt-Zeitkonto pro Person (Sekunden):</h3>
        <div class="time-container">
            <div class="time-box" onclick="selectTime(60, this)">60s</div>
            <div class="time-box selected" onclick="selectTime(120, this)">120s</div>
            <div class="time-box" onclick="selectTime(180, this)">180s</div>
            <div class="time-box" onclick="selectTime(240, this)">240s</div>
        </div>

        <button class="start" onclick="startGame()">SPIEL STARTEN</button>
    </div>

    <div id="game">
        <div id="player">---</div>

        <div class="taskCard" id="card">
            <div id="task">Bitte Übungsart wählen</div>
            <div id="timer">0</div>
        </div>

        <div style="margin-bottom: 20px;">
            <button class="diff" onclick="setDiff('easy', this)">Im Sitzen (1 Punkt)</button>
            <button class="diff" onclick="setDiff('medium', this)">Stand Leicht (2 Punkte)</button>
            <button class="diff" onclick="setDiff('hard', this)">Stand Aktiv (3 Punkte)</button>
        </div>

        <div>
            <button class="action-btn" onclick="startTurn()">Start</button>
            <button class="stop" onclick="stopTurn()">Erledigt</button>
        </div>

        <div id="board"></div>
    </div>

</div>

<script>
let players = [], scores = [], timeLeft = [];
let current = 0;
let timer = null;
let running = false;
let difficulty = null;
let baseTimeSelected = 120;
let nextTaskText = "";

const tasks = {
   easy: [
      "Im Sitzen: Beide Arme weit nach oben strecken (Sterne greifen).",
      "Im Sitzen: Die Fußspitzen abwechselnd anheben und senken.",
      "Im Sitzen: Die Schultern langsam kreisen lassen.",
      "Im Sitzen: Den Kopf sanft von der linken zur rechten Seite drehen.",
      "Im Sitzen: Die Hände auf den Knien ablegen und den Oberkörper kreisen lassen.",
      "Im Sitzen: Ein Bein nach vorne ausstrecken, kurz halten und wieder absenken.",
      "Im Sitzen: Die Hände zur Faust ballen und die Finger wieder weit spreizen."
   ],
   medium: [
      "Im sicheren Stand: Einmal aufstehen vom Stuhl ohne die Hände zu nutzen.",
      "Am Stuhl festhalten: Abwechselnd auf die Zehenspitzen stellen.",
      "Im Stand: Auf der Stelle langsam marschieren.",
      "Am Stuhl festhalten: Ein Bein leicht nach hinten abspreizen.",
      "Im sicheren Stand: Die Arme auf Brusthöhe nach vorne ausstrecken und halten.",
      "Am Stuhl festhalten: Das rechte Knie leicht anheben, dann das linke Knie.",
      "Im Stand: Die Hüfte langsam kreisen lassen (Hände an den Hüften)."
   ],
   hard: [
      "Freier Stand: 5 langsame, sichere Kniebeugen machen.",
      "Balance: Versuchen, für 10 Sekunden sicher auf einem Bein zu stehen.",
      "Koordinativ: Mit der rechten Hand das linke Knie berühren und umgekehrt.",
      "Im Stand: Die Arme seitlich ausstrecken und kleine Kreise in die Luft malen.",
      "Im Stand: Einen großen Schritt nach vorne machen und stabil stehen bleiben.",
      "Im Stand: Gewichtsverlagerung von der linken auf die rechte Seite und zurück.",
      "Freier Stand: Beide Arme zeitgleich vor dem Körper auf und ab bewegen."
   ]
};

// Verwaltet das automatische Hinzufügen von neuen Feldern
function handleInput(currentInput) {
    const container = document.getElementById("dynamicInputs");
    const inputs = container.getElementsByClassName("player-input");
    
    // Prüfen, ob das aktuelle Feld das letzte in der Liste ist und Text enthält
    if (currentInput === inputs[inputs.length - 1] && currentInput.value.trim() !== "") {
        const nextIndex = inputs.length + 1;
        const newInput = document.createElement("input");
        newInput.type = "text";
        newInput.className = "player-input";
        newInput.placeholder = "Name Person " + nextIndex;
        newInput.oninput = function() { handleInput(this); };
        container.appendChild(newInput);
        
        // Automatisches Herunterscrollen, falls die Liste länger wird
        container.scrollTop = container.scrollHeight;
    }
}

function selectTime(seconds, element) {
    baseTimeSelected = seconds;
    document.querySelectorAll(".time-box").forEach(box => box.classList.remove("selected"));
    element.classList.add("selected");
}

function playTone(freq, duration, delay = 0) {
    setTimeout(() => {
        try {
            let ctx = new (window.AudioContext || window.webkitAudioContext)();
            let o = ctx.createOscillator();
            let g = ctx.createGain();
            o.frequency.value = freq;
            o.type = "sine";
            g.gain.value = 0.1;
            o.connect(g);
            g.connect(ctx.destination);
            o.start();
            setTimeout(() => o.stop(), duration);
        } catch(e) { console.log("Audio-Fehler abgefangen"); }
    }, delay);
}

function soundStart() {
    playTone(523.25, 150, 0);
    playTone(659.25, 150, 150);
}

function soundPoint() {
    playTone(523.25, 100, 0);
    playTone(783.99, 150, 100); 
}

function soundGameOver() {
    playTone(400, 200, 0);
    playTone(300, 300, 200);
    playTone(200, 400, 500);
}

function setDiff(d, element) {
    if(running) return;
    difficulty = d;
    document.querySelectorAll(".diff").forEach(b => b.classList.remove("active"));
    element.classList.add("active");
    
    let list = tasks[difficulty];
    nextTaskText = list[Math.floor(Math.random() * list.length)];
    
    document.getElementById("task").innerText = "Übung bereit - Bitte starten";
}

function getWordForPoints(value) {
    return value === 1 ? "Punkt" : "Punkte";
}

function updateBoard() {
    let html = "<b>Aktivitäts-Protokoll und Zeitkonten</b><br><table style='width:100%; margin-top:10px; border-spacing: 10px;'>";
    for(let i = 0; i < players.length; i++) {
        let activeMarker = (i === current && timeLeft[i] > 0) ? "-> " : "";
        let statusText = timeLeft[i] <= 0 ? "<span style='color:#c62828; font-weight:bold;'>Zeit leer</span>" : `${timeLeft[i]}s`;
        
        html += `<tr style='${(i === current && timeLeft[i] > 0) ? "font-weight:bold; color:#005585;" : ""}'>
                    <td>${activeMarker}${players[i]}</td>
                    <td>${scores[i]} ${getWordForPoints(scores[i])}</td>
                    <td>${statusText}</td>
                 </tr>`;
    }
    html += "</table>";
    document.getElementById("board").innerHTML = html;
}

function startGame() {
    // Holt alle Input-Felder und filtert leere Einträge heraus
    const inputElements = document.querySelectorAll(".player-input");
    players = Array.from(inputElements)
                   .map(el => el.value.trim())
                   .filter(name => name !== "");

    if(players.length < 1) {
        alert("Bitte mindestens einen Namen eingeben.");
        return;
    }

    scores = Array(players.length).fill(0);
    timeLeft = Array(players.length).fill(baseTimeSelected);

    document.getElementById("setup").style.display = "none";
    document.getElementById("game").style.display = "block";

    current = 0;
    loadPlayer();
}

function loadPlayer() {
    if (timeLeft.every(t => t <= 0)) {
        endGame();
        return;
    }

    let initialCurrent = current;
    while (timeLeft[current] <= 0) {
        current = (current + 1) % players.length;
        if (current === initialCurrent) {
            endGame();
            return;
        }
    }

    document.getElementById("player").innerText = "An der Reihe: " + players[current];
    document.getElementById("task").innerText = "Wähle eine Übungsart aus (Buttons unten)";
    document.getElementById("timer").innerText = timeLeft[current];
    running = false;
    clearInterval(timer);
    updateBoard();
}

function startTurn() {
    if (!difficulty) {
        alert("Bitte wählen Sie zuerst eine Übungsart aus!");
        return;
    }
    if (running) return;

    document.getElementById("task").innerText = nextTaskText;

    soundStart();
    running = true;

    timer = setInterval(() => {
        if (timeLeft[current] > 0) {
            timeLeft[current]--;
            document.getElementById("timer").innerText = timeLeft[current];
        }

        if (timeLeft[current] <= 0) {
            clearInterval(timer);
            running = false;
            updateBoard();
            alert(players[current] + "s Zeitkonto ist abgelaufen!");
            nextPlayer();
        }
        updateBoard();
    }, 1000);
}

function stopTurn() {
    if (!running) return;

    clearInterval(timer);
    running = false;

    let points = difficulty === "easy" ? 1 : difficulty === "medium" ? 2 : 3;
    scores[current] += points;

    soundPoint();
    nextPlayer();
}

function nextPlayer() {
    document.querySelectorAll(".diff").forEach(b => b.classList.remove("active"));
    difficulty = null;
    nextTaskText = "";
    current = (current + 1) % players.length;
    loadPlayer();
}

function endGame() {
    clearInterval(timer);
    soundGameOver();

    let msg = "ALLE ZEITKONTEN LEER - AUSWERTUNG\n\nErgebnisübersicht:\n";
    let winner = "";
    let maxPoints = -1;

    for (let i = 0; i < players.length; i++) {
        msg += `${players[i]}: ${scores[i]} ${getWordForPoints(scores[i])}\n`;
        if (scores[i] > maxPoints) {
            maxPoints = scores[i];
            winner = players[i];
        }
    }

    msg += "\nSieger der Aktiv-Challenge ist: " + winner + "!";
    alert(msg);
    location.reload();
}
</script>

</body>
</html>
